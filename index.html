<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🚀 Dashboard PRO MAX + AI Map</title>

    <!-- ✅ LIB -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
      body {
        margin: 0;
        background: #0f172a;
        color: #fff;
        font-family: Arial, sans-serif;
      }
      .header {
        padding: 12px;
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        background: #020617;
        border-bottom: 1px solid #334155;
      }
      input,
      select,
      textarea,
      button {
        font-family: Arial, sans-serif;
      }
      #search {
        padding: 9px 12px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #1e293b;
        color: #fff;
      }
      button {
        cursor: pointer;
      }
      .shift-box {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #shiftDaily {
        width: 180px;
        height: 42px;
        background: #111827;
        color: #fff;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 8px;
        resize: vertical;
      }
      #shiftDaily:focus {
        outline: none;
        border-color: #38bdf8;
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.45);
      }
      .btn-shift-clear {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid rgba(239, 68, 68, 0.4);
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.25s ease;
      }
      .btn-shift-clear:hover {
        background: #ef4444;
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 0 12px rgba(239, 68, 68, 0.7);
      }
      .kpi-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin: 15px;
        flex-wrap: wrap;
      }
      .kpi {
        padding: 10px 18px;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        opacity: 0.65;
        user-select: none;
      }
      .kpi.active {
        opacity: 1;
        transform: scale(1.08);
        border: 2px solid #fff;
      }
      .red {
        background: #ef4444;
      }
      .orange {
        background: #f59e0b;
      }
      .green {
        background: #22c55e;
      }
      .gray {
        background: #64748b;
      }
      .card {
        margin: 15px auto;
        padding: 12px;
        border-radius: 12px;
        width: 95%;
        max-width: 1600px;
        background: #111827;
        border: 1px solid #334155;
        box-shadow: 0 0 12px rgba(0, 0, 0, 0.25);
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        gap: 12px;
        flex-wrap: wrap;
      }
      .btn-export {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 12px;
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.4);
        color: #4ade80;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s ease;
      }
      .btn-export:hover {
        background: #22c55e;
        color: #022c22;
        box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
      }
      table {
        width: 100%;
        min-width: 1200px;
        border-collapse: collapse;
      }
      th {
        background: #334155;
        padding: 8px;
      }
      td {
        padding: 8px;
        font-size: 13px;
        vertical-align: middle;
        border-bottom: 1px solid rgba(148, 163, 184, 0.15);
      }
      .badge {
        display: inline-block;
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 14px;
        text-align: center;
        min-width: 90px;
      }
      .critical {
        background: #ef4444;
        color: #fff;
      }
      .major {
        background: #f59e0b;
        color: #fff;
      }
      .minor {
        background: #22c55e;
        color: #fff;
      }
      .none {
        background: #64748b;
        color: #fff;
      }
      .work {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      }
      .work-access {
        background: linear-gradient(135deg, #7f1d1d, #dc2626);
        color: #fecaca;
      }
      .work-transmission {
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        color: #dbeafe;
      }
      .work-power {
        background: linear-gradient(135deg, #374151, #f59e0b);
        color: #fff7ed;
      }
      .work-leased {
        background: linear-gradient(135deg, #1e3a8a, #6d28d9);
        color: #fff;
      }
      .work-other {
        background: #78350f;
        color: #fcd34d;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 6px;
        border-radius: 12px;
        font-size: 10px;
        font-weight: 600;
        opacity: 0.75;
        background: #475569;
        color: #e2e8f0;
        box-shadow: 0 0 6px rgba(255, 255, 255, 0.15);
      }
      .status-assigned {
        background: #f59e0b;
        color: #fff;
      }
      .status-onsite {
        background: #22c55e;
        color: #fff;
      }
      .status-departed {
        background: #3b82f6;
        color: #fff;
      }
      .status-created {
        background: #64748b;
        color: #fff;
      }
      .status-done {
        background: #16a34a;
        color: #fff;
      }
      .prov-name {
        font-weight: bold;
      }
      .dist {
        font-size: 12px;
        color: #94a3b8;
      }
      .assign-box {
        text-align: center;
        color: #22c55e;
        font-weight: bold;
      }
      .overdue {
        background: #7f1d1d;
      }
      .title-cell {
        position: relative;
      }
      .title-text {
        padding-right: 20px;
      }
      .remark-btn {
        position: absolute;
        right: 6px;
        bottom: 4px;
        font-size: 11px;
        cursor: pointer;
        opacity: 0.65;
      }
      .remark-btn:hover {
        opacity: 1;
        transform: scale(1.15);
        color: #38bdf8;
      }
      .has-remark {
        color: #facc15;
        opacity: 0.9;
      }
      .sla-bar {
        width: 120px;
        height: 12px;
        background: #1e293b;
        border-radius: 10px;
        overflow: hidden;
        position: relative;
      }
      .sla-fill {
        height: 100%;
        border-radius: 10px;
      }
      .sla-green {
        background: #22c55e;
      }
      .sla-yellow {
        background: #facc15;
      }
      .sla-red {
        background: #ef4444;
      }
      .sla-text {
        font-size: 11px;
        margin-top: 4px;
        text-align: center;
      }
      .sla-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        min-height: 36px;
      }
      .select2-container--default .select2-selection--single {
        background: #1e293b;
        border: 1px solid #334155;
        color: #fff;
        height: 36px;
        border-radius: 8px;
      }
      .select2-selection__rendered {
        color: #fff !important;
      }
      .select2-selection__arrow b {
        border-color: #fff transparent transparent transparent !important;
      }
      .select2-dropdown {
        background: #1e293b;
        border: 1px solid #334155;
      }
      .select2-results__option {
        color: #e2e8f0;
        padding: 8px;
      }
      .select2-results__option--highlighted {
        background: #22c55e !important;
        color: #fff;
      }
      .select2-results__option[aria-selected='true'] {
        background: #334155;
        color: #38bdf8;
      }
      .select2-search__field {
        background: #0f172a;
        color: #fff;
        border: none;
      }
      .no-data {
        text-align: center;
        padding: 30px;
      }
      .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .popup-card {
        background: #111;
        border: 2px solid orange;
        border-radius: 8px;
        padding: 16px;
        width: 380px;
        color: #fff;
        font-family: Consolas, monospace;
        box-shadow: 0 0 20px #000;
      }
      .popup-card h2 {
        color: #facc15;
        margin-bottom: 8px;
        font-size: 18px;
      }
      .popup-sub {
        color: #a3e635;
        font-size: 13px;
        line-height: 1.4;
        margin-bottom: 8px;
        max-height: 120px;
        overflow: auto;
      }
      .popup-code {
        color: #fbbf24;
        font-size: 12px;
        margin-bottom: 10px;
        word-break: break-word;
      }
      .popup-remark {
        margin-top: 10px;
        font-size: 13px;
        line-height: 1.5;
      }
      .popup-assign {
        margin-top: 10px;
        font-size: 12px;
        color: #93c5fd;
      }
      .popup-status {
        margin-top: 8px;
        font-weight: bold;
        display: inline-block;
        padding: 6px 14px;
        border-radius: 10px;
      }
      .popup-time {
        float: right;
        color: #facc15;
        font-weight: bold;
      }
      .popup-critical {
        background: #ef4444;
        color: #fff;
      }
      .popup-major {
        background: #f59e0b;
        color: #fff;
      }
      .popup-minor {
        background: #22c55e;
        color: #fff;
      }
      .popup-none {
        background: #64748b;
        color: #fff;
      }
      .popup-assigned {
        background: #f59e0b;
        color: #fff;
      }
      .popup-onsite {
        background: #22c55e;
        color: #fff;
      }
      .popup-departed {
        background: #3b82f6;
        color: #fff;
      }
      .popup-created {
        background: #64748b;
        color: #fff;
      }
      .popup-done {
        background: #16a34a;
        color: #fff;
      }
      .popup-held {
        background: #a855f7;
        color: #fff;
      }
      .popup-cancel {
        background: #dc2626;
        color: #fff;
      }
      .popup-transfer {
        background: #f97316;
        color: #fff;
      }
      .popup-accepted {
        background: #0891b2;
        color: #fff;
      }
      .popup-interrupted {
        background: #eab308;
        color: #000;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <input type="file" id="file" accept=".xlsx,.xls,.csv" />
      <input id="search" placeholder="🔍 ค้นหา" />
      <select id="provinceFilter" style="width: 200px"></select>
      <button onclick="resetAll()">Reset</button>
      <button
        onclick="showAIBoard()"
        style="
          background: #7c3aed;
          color: #fff;
          padding: 8px 14px;
          border: none;
          border-radius: 10px;
          cursor: pointer;
          font-weight: bold;
        "
      >
        🧠 AI Action Board
      </button>
      <div class="shift-box">
        <textarea id="shiftDaily" placeholder="Shift Daily..."></textarea>
        <button class="btn-shift-clear" onclick="clearShift()">
          🧹 Clear Shift
        </button>
      </div>
    </div>

    <div class="kpi-row" id="kpiBar">
      <div class="kpi red" onclick="pick('critical')" id="c">Critical:0</div>
      <div class="kpi orange" onclick="pick('major')" id="m">Major:0</div>
      <div class="kpi green" onclick="pick('minor')" id="n">Minor:0</div>
      <div class="kpi gray" onclick="pick('total')" id="t">Total:0</div>
      <div
        class="kpi"
        onclick="pick('overdue')"
        id="o"
        style="background: #991b1b"
      >
        Overdue:0
      </div>
    </div>

    <div id="root"></div>
    <div id="remarkPopup" class="popup" style="display: none">
      <div class="popup-card" id="remarkContent"></div>
    </div>

    <script>
      function checkFactoryAuth() {
        const auth = JSON.parse(localStorage.getItem('factoryAuth'));

        if (!auth) {
          location.replace(
            'https://pongthepstar8-web.github.io/tool-launcher/'
          );
          return false;
        }

        const expireTime = 8 * 60 * 60 * 1000; // 8 ชั่วโมง

        if (Date.now() - auth.loginTime > expireTime) {
          localStorage.clear();

          location.replace(
            'https://pongthepstar8-web.github.io/tool-launcher/'
          );
          return false;
        }

        return true;
      }

      checkFactoryAuth();
      let data = [],
        selected = [];
      let viewMode = 0;

      function getShiftNames() {
        let txt = document.getElementById('shiftDaily').value;
        return txt
          .split('\n')
          .map((line) => {
            let m = line.match(/([A-Za-z]+)\s+([A-Za-z]+)\s+\d{3}-\d+/);
            if (m) return `${m[1]} ${m[2]}`;
            let p = line.trim().split(/\s+/);
            return p.length >= 2 ? p.slice(-2).join(' ').trim() : '';
          })
          .filter(Boolean);
      }
      function clearShift() {
        localStorage.removeItem('shiftDaily');
        document.getElementById('shiftDaily').value = '';
      }
      window.addEventListener('load', () => {
        let box = document.getElementById('shiftDaily');
        box.value = localStorage.getItem('shiftDaily') || '';
        box.addEventListener('input', () =>
          localStorage.setItem('shiftDaily', box.value)
        );
      });
      function mapCol(r, k) {
        for (let x of k) {
          if (r[x] != undefined) return r[x];
        }
        return '';
      }
      const getHr = (t) => {
        let d = new Date(t);
        return isNaN(d) ? 0 : (new Date() - d) / 3600000;
      };
      function formatTime(hr) {
        let h = Math.floor(hr);
        let m = Math.round((hr - h) * 60);
        return h > 0 ? (m > 0 ? `${h}h ${m}m` : `${h}h`) : `${m}m`;
      }
      function getSLA(hr, limit) {
        let pct = Math.min((hr / limit) * 100, 100);
        let color = 'sla-green';
        if (pct > 70) color = 'sla-yellow';
        if (pct > 90) color = 'sla-red';
        return { pct, color };
      }
      const PROV_CODE = {
        ขอนแก่น: 'KKN',
        ร้อยเอ็ด: 'RET',
        มหาสารคาม: 'MKM',
        สกลนคร: 'SNK',
        นครพนม: 'NPM',
        มุกดาหาร: 'MDH',
        กาฬสินธุ์: 'KSN',
        อุดรธานี: 'UDN',
        เลย: 'LEI',
        หนองคาย: 'NKI',
        บึงกาฬ: 'BKN',
        หนองบัวลำภู: 'NLP',
        นครราชสีมา: 'NMA',
        ชัยภูมิ: 'CPM',
        ศรีสะเกษ: 'SSK',
        บุรีรัมย์: 'BRM',
        อุบลราชธานี: 'UBN',
        สุรินทร์: 'SRN',
        ยโสธร: 'YST',
        อำนาจเจริญ: 'ACR',
      };
      function getStatusInfo(s) {
        let t = (s || '').toLowerCase();
        if (t.includes('on-site') || t.includes('onsite'))
          return { cls: 'onsite', icon: '🧑‍🔧', text: 'On-site' };
        if (t.includes('assigned'))
          return { cls: 'assigned', icon: '📋', text: 'Assigned' };
        if (t.includes('departed'))
          return { cls: 'departed', icon: '🚗', text: 'Departed' };
        if (t.includes('done')) return { cls: 'done', icon: '🎯', text: s };
        if (t.includes('accepted'))
          return { cls: 'accepted', icon: '📥', text: 'Accepted' };
        if (t.includes('interupted') || t.includes('interrupted'))
          return { cls: 'interrupted', icon: '⚠️', text: 'Interrupted' };
        if (t.includes('held'))
          return { cls: 'held', icon: '💤', text: 'Held' };
        if (t.includes('cancel'))
          return { cls: 'cancel', icon: '❌', text: 'Cancel' };
        if (t.includes('transfer'))
          return { cls: 'transfer', icon: '🔁', text: 'Transfer' };
        return { cls: 'created', icon: '🆕', text: 'Created' };
      }
      function getStatusIcon(status) {
        let s = (status || '').toLowerCase();
        if (s.includes('done')) return '✅ Done';
        if (s.includes('on-site') || s.includes('onsite')) return '🟢 On-Site';
        if (s.includes('departed')) return '🔵 Departed';
        if (s.includes('assigned')) return '🟡 Assigned';
        if (s.includes('accepted')) return '📥 Accepted';
        if (s.includes('held')) return '💤 Held';
        if (s.includes('cancel')) return '❌ Cancel';
        return '⚪ Created';
      }
      function getPriorityIcon(pr) {
        pr = (pr || '').toUpperCase();
        if (pr === 'CRITICAL') return '🚨 Critical';
        if (pr === 'MAJOR') return '⚠️ Major';
        if (pr === 'MINOR') return '🟢 Minor';
        return '⚪ None';
      }
      function getWorkType(t) {
        t = (t || '').toLowerCase();
        if (
          t.includes('high loss') ||
          t.includes('loss') ||
          (t.includes('pon') && t.includes('loss')) ||
          (t.includes('splitter') && t.includes('l2'))
        )
          return {
            icon: '📉',
            text: 'Signal Loss',
            full: '📉 Signal Loss (High loss)',
            type: 'transmission',
          };
        if (
          t.includes('bipv') ||
          t.includes('inf') ||
          t.includes('ipv') ||
          t.includes('binl') ||
          t.includes('inl')
        )
          return {
            icon: '🏢',
            text: 'Business Circuit',
            full: '🏢 Business Circuit (BIPV / INF / IPV / INL)',
            type: 'leased',
          };
        if (t.includes('splitter') || t.includes('pon'))
          return {
            icon: '🔗',
            text: 'Access Down',
            full: '🔗 Access Down (Splitter / PON)',
            type: 'access',
          };
        if (t.includes('olt') || t.includes('ac fail'))
          return {
            icon: '⚡',
            text: 'Access Power Fail',
            full: '⚡ Access Power Fail (OLT AC Fail)',
            type: 'access',
          };
        if (t.includes('crc'))
          return {
            icon: '📡',
            text: 'Transmission Error',
            full: '📡 Transmission Error (CRC)',
            type: 'transmission',
          };
        if (t.includes('rectifier') || t.includes('power'))
          return {
            icon: '🔌',
            text: 'Power Failure',
            full: '🔌 Power Failure (Rectifier)',
            type: 'power',
          };
        if (t.includes('loop broken'))
          return {
            icon: '🔁❌',
            text: 'Loop Broken',
            full: '🔁❌ ERPS Loop Broken',
            type: 'access',
          };
        if (t.includes('link down') || t.includes('down'))
          return {
            icon: '🚫',
            text: 'Link Down',
            full: '🚫 Link Down',
            type: 'access',
          };
        return {
          icon: '❗',
          text: 'Unknown',
          full: '❗ Unknown',
          type: 'other',
        };
      }
      function getSite(title) {
        let m = (title || '').match(/(ME|OX|AN)_[0-9_]+/i);
        return m ? m[0] : 'Unknown';
      }
      function toggleAllStatus() {
        viewMode = (viewMode + 1) % 3;
        render();
      }
      function pick(t) {
        selected = [t];
        $('.kpi').removeClass('active');
        $(
          '#' +
            { critical: 'c', major: 'm', minor: 'n', total: 't', overdue: 'o' }[
              t
            ]
        ).addClass('active');
        render();
      }
      function pass(pr, od) {
        if (!selected.length) return true;
        let t = selected[0];
        if (t === 'overdue') return od;
        if (t === 'critical') return pr === 'CRITICAL';
        if (t === 'major') return pr === 'MAJOR';
        if (t === 'minor') return pr === 'MINOR' || pr === 'NONE';
        return true;
      }
      function exportJPG(p) {
        let box = document.createElement('div');
        box.style.background = '#0f172a';
        box.style.padding = '20px';
        box.appendChild(document.getElementById('kpiBar').cloneNode(true));
        box.appendChild(document.getElementById(p).cloneNode(true));
        document.body.appendChild(box);
        html2canvas(box, {
          scale: 2,
          useCORS: true,
          width: box.scrollWidth,
          height: box.scrollHeight,
          windowWidth: box.scrollWidth,
        }).then((c) => {
          let a = document.createElement('a');
          a.href = c.toDataURL('image/jpeg');
          a.download = 'NOC_' + p + '.jpg';
          a.click();
          document.body.removeChild(box);
        });
      }
      file.onchange = (e) => {
        let r = new FileReader();
        r.onload = (ev) => {
          let wb = XLSX.read(new Uint8Array(ev.target.result), {
            type: 'array',
          });
          data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          initProvince();
          render();
        };
        r.readAsArrayBuffer(e.target.files[0]);

      function extractGPS(title) {
        title = title || '';

        // ต้องมี keyword บอกว่าเป็นพิกัด
        // ลดการจับเลขจาก Title เช่น 3804_142 หรือ SitePriority
        let hasGpsKeyword = /gps|coord|coordinate|พิกัด|lat|lon|lng/i.test(
          title
        );

        // Lat:17.9805025 Lon:104.069824
        let m = title.match(
          /lat[:= ]\s*(-?\d{1,2}\.\d+).*?(lon|lng)[:= ]\s*(-?\d{1,3}\.\d+)/i
        );

        if (m) {
          let c = normalizeThaiCoord(m[1], m[3]);

          if (c) return c;
        }

        // Decimal comma: 17.9805025,104.069824
        let re = /(-?\d{1,3}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)/g;

        while ((m = re.exec(title)) !== null) {
          let c = normalizeThaiCoord(m[1], m[2]);

          if (c) return c;
        }

        // Space decimal: GPS 17.9805025 104.069824
        // จับเฉพาะมีคำว่า gps/พิกัด/coord เท่านั้น
        if (hasGpsKeyword) {
          re = /(-?\d{1,3}\.\d+)\s+(-?\d{1,3}\.\d+)/g;

          while ((m = re.exec(title)) !== null) {
            let c = normalizeThaiCoord(m[1], m[2]);

            if (c) return c;
          }
        }

        // DMS: 17°58'45.4"N 104°03'12.4"E
        m = title.match(
          /(\d{1,2})°(\d{1,2})'([\d.]+)"([NS])\s+(\d{1,3})°(\d{1,2})'([\d.]+)"([EW])/i
        );

        if (m) {
          let lat = Number(m[1]) + Number(m[2]) / 60 + Number(m[3]) / 3600;

          let lng = Number(m[5]) + Number(m[6]) / 60 + Number(m[7]) / 3600;

          if (m[4].toUpperCase() === 'S') lat *= -1;

          if (m[8].toUpperCase() === 'W') lng *= -1;

          if (isThailandCoord(lat, lng)) {
            return { lat, lng };
          }
        }

        return null;
      }
      function distanceKm(lat1, lng1, lat2, lng2) {
        const R = 6371;

        let dLat = ((lat2 - lat1) * Math.PI) / 180;

        let dLng = ((lng2 - lng1) * Math.PI) / 180;

        let a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLng / 2) *
            Math.sin(dLng / 2);

        let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return R * c;
      }

          let title = job['Job Title'] || '';

          let gps = extractGPS(title);

          let province = job['Province Name'] || '';

          let district = job['District Name'] || '';

          if (gps && isCoordNearJobArea(gps, province, district)) {
            return [gps.lat, gps.lng];
          }

          let coord = getAreaCoord(province, district);

          if (!coord) {
            coord = await geocodeArea(province, district);
          }

          return coord;
        }

        function getLatestOnsiteJob() {
          let selected = (w.selectedEngineer || '').toLowerCase().trim();

          let onsites = jobs
            .filter((job) => {
              let s = (job['Status'] || '').toLowerCase();

              let assign = (job['Assign to'] || '').toLowerCase().trim();

              let isOnsite = s.includes('on-site') || s.includes('onsite');

              if (!isOnsite) return false;

              if (selected && assign !== selected) return false;

              return true;
            })
            .sort(
              (a, b) => new Date(b['Create Time']) - new Date(a['Create Time'])
            );

          return onsites[0] || null;
        }

        async function buildSmartRouteJobs() {
          let startJob = getLatestOnsiteJob();

          if (!startJob) {
            alert('ไม่พบ Job สถานะ On-site สำหรับใช้เป็นจุดเริ่มต้น');
            return [];
          }

          let startCoord = await getJobCoord(startJob);

          if (!startCoord) {
            alert('ไม่พบพิกัดของ Job On-site ล่าสุด');
            return [];
          }

          let candidates = [];

          for (const job of jobs) {
            if (job['Job ID'] === startJob['Job ID']) {
              continue;
            }

            let selected = (w.selectedEngineer || '').toLowerCase().trim();

            let assign = (job['Assign to'] || '').toLowerCase().trim();

            if (selected && assign !== selected) {
              continue;
            }

            let status = (job['Status'] || '').toLowerCase();

            if (status.includes('done') || status.includes('cancel')) {
              continue;
            }

            let coord = await getJobCoord(job);

            if (!coord) continue;

            let pr = (job['Priority'] || 'NONE').toUpperCase();

            let remain = job.limit - getHr(job['Create Time']);

            let dist = distanceKm(
              startCoord[0],
              startCoord[1],
              coord[0],
              coord[1]
            );

            let priorityScore =
              pr === 'CRITICAL'
                ? 1000
                : pr === 'MAJOR'
                ? 600
                : pr === 'MINOR'
                ? 300
                : 100;

            let overdueScore = job.overdue > 0 ? 800 : 0;

            let slaScore = remain <= 2 ? 300 : remain <= 4 ? 150 : 0;

            let distanceScore = Math.max(0, 200 - dist);

            let score = priorityScore + overdueScore + slaScore + distanceScore;

            candidates.push({
              job,
              coord,
              score,
              dist,
            });
          }

          candidates.sort((a, b) => b.score - a.score);

          let selectedJobs = candidates.slice(0, 4);

          return [
            {
              job: startJob,
              coord: startCoord,
              start: true,
            },
            ...selectedJobs,
          ];
        }

        w.drawAIRoute = async function () {
          if (!aiMap) return;

          let routeJobs = await buildSmartRouteJobs();

          if (routeJobs.length < 2) {
            alert('ไม่พบงานถัดไปสำหรับสร้าง Route');
            return;
          }

          if (aiRouteLine) {
            aiMap.removeLayer(aiRouteLine);
          }

          aiRouteMarkers.forEach((m) => {
            aiMap.removeLayer(m);
          });

          aiRouteMarkers = [];

          aiRoutePoints = routeJobs.map((x) => x.coord);

          aiRouteLine = w.L.polyline(aiRoutePoints, {
            color: '#22c55e',
            weight: 5,
            opacity: 0.9,
          }).addTo(aiMap);

          routeJobs.forEach((item, idx) => {
            let routeMarker = w.L.marker(item.coord, {
              icon: w.L.divIcon({
                className: '',
                html: `
              <div style="
                background:${item.start ? '#2563eb' : '#22c55e'};
                color:white;
                padding:4px 8px;
                border-radius:14px;
                font-weight:bold;
                border:2px solid white;
                box-shadow:0 0 10px rgba(34,197,94,.8);
                white-space:nowrap;
              ">
                ${item.start ? '🚩 START' : '✅ ' + idx}
              </div>
            `,
                iconSize: [90, 28],
                iconAnchor: [20, 14],
              }),
            }).addTo(aiMap).bindPopup(`
        <div style="color:#111">
          <b>${item.start ? 'START - On-site ล่าสุด' : 'Route Job ' + idx}</b>
          <br>
          ${item.job['Job ID'] || '-'}
          <br>
          ${item.job['Job Title'] || '-'}
          <br>
          ${item.job['District Name'] || '-'}
        </div>
      `);

            aiRouteMarkers.push(routeMarker);
          });

          aiMap.fitBounds(aiRouteLine.getBounds(), {
            padding: [50, 50],
          });
        };

        w.clearAIRoute = function () {
          if (aiRouteLine) {
            aiMap.removeLayer(aiRouteLine);
            aiRouteLine = null;
          }

          aiRouteMarkers.forEach((m) => {
            aiMap.removeLayer(m);
          });

          aiRouteMarkers = [];
          aiRoutePoints = [];
        };

        w.fitAllMarkers = function () {
          if (!aiMap || aiAllPoints.length === 0) return;

          aiMap.fitBounds(aiAllPoints, {
            padding: [50, 50],
          });
        };

        w.openGoogleRoute = async function () {
          if (aiRoutePoints.length < 1) {
            let routeJobs = await buildSmartRouteJobs();

            aiRoutePoints = routeJobs.map((x) => x.coord);
          }

          if (aiRoutePoints.length < 1) return;

          if (aiRoutePoints.length === 1) {
            let only = aiRoutePoints[0];

            window.open(
              `https://www.google.com/maps/dir/?api=1&destination=${only[0]},${only[1]}`,
              '_blank'
            );

            return;
          }

          let start = aiRoutePoints[0];

          let end = aiRoutePoints[aiRoutePoints.length - 1];

          let middle = aiRoutePoints
            .slice(1, -1)
            .slice(0, 8)
            .map((p) => `${p[0]},${p[1]}`)
            .join('|');

          let url =
            `https://www.google.com/maps/dir/?api=1` +
            `&origin=${start[0]},${start[1]}` +
            `&destination=${end[0]},${end[1]}` +
            (middle ? `&waypoints=${middle}` : '');

          window.open(url, '_blank');
        };

        w.changeView = function (view, btn) {
          w.document
            .querySelectorAll('.view-btn')
            .forEach((x) => x.classList.remove('active'));
          btn.classList.add('active');
          let engineerView = w.document.getElementById('engineerView'),
            districtView = w.document.getElementById('districtView'),
            rootView = w.document.getElementById('rootView'),
            mapView = w.document.getElementById('mapView'),
            districtFilterBar = w.document.getElementById('districtFilterBar');
          if (engineerView) engineerView.style.display = 'none';
          if (districtView) districtView.style.display = 'none';
          if (rootView) rootView.style.display = 'none';
          if (mapView) mapView.style.display = 'none';
          if (districtFilterBar) districtFilterBar.style.display = 'none';
          switch (view) {
            case 'engineer':
              if (engineerView) engineerView.style.display = 'flex';
              break;
            case 'district':
              if (districtView) districtView.style.display = 'flex';
              if (districtFilterBar) districtFilterBar.style.display = 'flex';
              break;
            case 'root':
              if (rootView) rootView.style.display = 'flex';
              break;
            case 'map':
              if (mapView) {
                mapView.style.display = 'block';
                setTimeout(() => w.initAIMap && w.initAIMap(), 300);
              }
              break;
          }
        };
        w.selectedEngineer = '';

        w.filterEngineer = function (assign, btn) {
          w.selectedEngineer = (assign || '').toLowerCase().trim();

          w.document
            .querySelectorAll('.engineer-btn')
            .forEach((x) => x.classList.remove('active'));

          if (btn) {
            btn.classList.add('active');
          }

          w.document
            .querySelectorAll('#districtView .ai-card')
            .forEach((card) => {
              let visibleCount = 0;

              card.querySelectorAll('.dist-job').forEach((job) => {
                let jobAssign = (job.dataset.assign || '').toLowerCase().trim();

                let show =
                  !w.selectedEngineer || jobAssign === w.selectedEngineer;

                job.classList.toggle('hide-by-engineer', !show);

                if (show) {
                  visibleCount++;
                }
              });

              card.style.display = visibleCount > 0 ? '' : 'none';
            });
        };
        w.filterCardJobs = function (btn, type) {
          let card = btn.closest('.ai-card');

          if (!card) return;

          card
            .querySelectorAll('.summary-chip')
            .forEach((x) => x.classList.remove('active'));

          btn.classList.add('active');

          let jobs = card.querySelectorAll('.dist-job');

          jobs.forEach((job) => {
            let pr = job.dataset.priority || '';

            let overdue = job.dataset.overdue || 'no';

            let show = true;

            if (type === 'critical') {
              show = pr === 'CRITICAL';
            } else if (type === 'major') {
              show = pr === 'MAJOR';
            } else if (type === 'overdue') {
              show = overdue === 'yes';
            } else {
              show = true;
            }

            job.classList.toggle('hide', !show);
          });
        };
        w.filterDistrict = function (district, btn) {
          w.document
            .querySelectorAll('.district-btn')
            .forEach((x) => x.classList.remove('active'));
          if (btn) btn.classList.add('active');
          w.document
            .querySelectorAll('#districtView .ai-card')
            .forEach((card) => {
              let cardDistrict = (card.dataset.district || '')
                .trim()
                .toLowerCase();
              let targetDistrict = (district || '').trim().toLowerCase();
              card.style.display =
                !district || cardDistrict === targetDistrict ? '' : 'none';
            });
        };
      }

      function render() {
        let prov = $('#provinceFilter').val();
        let map = {},
          c = 0,
          m = 0,
          n = 0,
          o = 0;
        data.forEach((r) => {
          let pr = (mapCol(r, ['Priority']) || 'NONE').toUpperCase();
          let p = mapCol(r, ['Province Name']);
          let job = (mapCol(r, ['Job ID']) || '').toLowerCase();
          let title = (mapCol(r, ['Job Title']) || '').toLowerCase();
          let status = (mapCol(r, ['Status']) || '').toLowerCase();
          let assign = (mapCol(r, ['Assign to']) || '').toLowerCase();
          let province = (mapCol(r, ['Province Name']) || '').toLowerCase();
          let district = (mapCol(r, ['District Name']) || '').toLowerCase();
          let work = getWorkType(title).text.toLowerCase();
          let hr = getHr(r['Create Time']);
          let limit = pr === 'CRITICAL' ? 3 : pr === 'MAJOR' ? 10 : 1000;
          let od = hr > limit;
          let k = $('#search').val().toLowerCase().trim();
          let keys = k ? k.split(/\s+/) : [];
          let code = (PROV_CODE[p] || '').toLowerCase();
          let text =
            job +
            ' ' +
            title +
            ' ' +
            status +
            ' ' +
            assign +
            ' ' +
            province +
            ' ' +
            district +
            ' ' +
            work +
            ' ' +
            code;
          if (od) text += ' overdue';
          for (let key of keys) {
            if (key === 'overdue' && !od) return;
            if (key !== 'overdue' && !text.includes(key)) return;
          }
          if (prov && p !== prov) return;
          if (pr === 'CRITICAL') c++;
          else if (pr === 'MAJOR') m++;
          else n++;
          if (od) o++;
          if (!pass(pr, od)) return;
          if (!map[p]) map[p] = [];
          map[p].push({
            ...r,
            pr,
            hr,
            limit,
            od,
            district: r['District Name'],
            status: r['Status'],
            assign: r['Assign to'] || '-',
            work: getWorkType(title),
          });
        });
        $('#c').text('Critical:' + c);
        $('#m').text('Major:' + m);
        $('#n').text('Minor:' + n);
        $('#t').text('Total:' + (c + m + n));
        $('#o').text('Overdue:' + o);
        root.innerHTML =
          Object.keys(map)
            .map(
              (p) =>
                `<div class="card" id="${p}"><div class="card-header"><h3>📍 ${
                  PROV_CODE[p] ? `(${PROV_CODE[p]}) ` : ''
                }${p}</h3><button class="btn-export" onclick="exportJPG('${p}')"><span>📸</span><span>Export</span></button></div><table><tr><th>Job</th><th>Priority</th><th>Create</th><th>Mode <span onclick="toggleAllStatus()" style="cursor:pointer;margin-left:6px">${
                  viewMode === 0
                    ? '👁 Work'
                    : viewMode === 1
                    ? '📊 Status'
                    : '🔄 Both'
                }</span></th><th>Title</th><th>Province</th><th>Assign</th><th>Elapsed</th><th>Remain</th></tr>${map[
                  p
                ]
                  .map(
                    (r) =>
                      `<tr class="${r.od ? 'overdue' : ''}"><td>${
                        r['Job ID'] || ''
                      }</td><td><div class="badge ${r.pr.toLowerCase()}">${
                        r.pr
                      }</div></td><td>${
                        r['Create Time'] || ''
                      }</td><td><div class="work work-${
                        r.work.type
                      }" style="display:${
                        viewMode === 0 || viewMode === 2
                          ? 'inline-flex'
                          : 'none'
                      }">${r.work.icon} ${
                        r.work.text
                      }</div><div class="status-badge status-${
                        getStatusInfo(r.status).cls
                      }" style="display:${
                        viewMode === 1 || viewMode === 2
                          ? 'inline-flex'
                          : 'none'
                      }">${getStatusInfo(r.status).icon} ${
                        getStatusInfo(r.status).text
                      }</div></td><td class="title-cell"><div class="title-text">${
                        r['Job Title'] || ''
                      }</div><span class="remark-btn ${
                        r['Reason by WF'] ? 'has-remark' : ''
                      }" onclick="showRemark('${
                        r['Job ID']
                      }')">ℹ️</span></td><td><div class="prov-name">${p}</div><div class="dist">${
                        r.district || ''
                      }</div></td><td><div class="assign-box">${
                        r.assign
                      }</div></td><td>${(() => {
                        let s = getSLA(r.hr, r.limit);
                        return `<div class="sla-box"><div class="sla-bar"><div class="sla-fill ${
                          s.color
                        }" style="width:${
                          s.pct
                        }%"></div></div><div class="sla-text">${s.pct.toFixed(
                          0
                        )}%</div><div class="sla-text">${formatTime(
                          r.hr
                        )}</div></div>`;
                      })()}</td><td>${(() => {
                        let s = getSLA(r.hr, r.limit);
                        return `<div class="sla-box"><div class="sla-bar"><div class="sla-fill ${
                          r.od ? 'sla-red' : s.color
                        }" style="width:${
                          s.pct
                        }%"></div></div><div class="sla-text">${s.pct.toFixed(
                          0
                        )}%</div><div class="sla-text">${
                          r.od ? '🔥OVERDUE🔥' : formatTime(r.limit - r.hr)
                        }</div></div>`;
                      })()}</td></tr>`
                  )
                  .join('')}</table></div>`
            )
            .join('') || '<div class="no-data">❌ ไม่พบข้อมูล</div>';
      }
    </script>
  </body>
</html>
