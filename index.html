<script>
  
let data=[],selected=[];

let viewMode = 0;
/*
0 = Work Only
1 = Status Only
2 = Both
*/
function getShiftNames(){

let txt =
  document.getElementById("shiftDaily").value;

return txt
  .split("\n")
  .map(line=>{

    let m = line.match(
      /([A-Za-z]+)\s+([A-Za-z]+)\s+\d{3}-\d+/
    );

    return m
      ? `${m[1]} ${m[2]}`
      : "";

  })
  .filter(Boolean);

}

function clearShift(){

localStorage.removeItem(
  "shiftDaily"
);

document.getElementById(
  "shiftDaily"
).value = "";

}
window.addEventListener("load",()=>{

let box =
  document.getElementById(
    "shiftDaily"
  );

box.value =
  localStorage.getItem(
    "shiftDaily"
  ) || "";

box.addEventListener(
  "input",
  ()=>{

    localStorage.setItem(
      "shiftDaily",
      box.value
    );

  }
);

});
function getStatusInfo(s){
  let t = (s || "").toLowerCase();

  if(t.includes("on-site") || t.includes("onsite")){
    return { cls:"onsite", icon:"🧑‍🔧", text:"On-site" };
  }

  if(t.includes("assigned")){
    return { cls:"assigned", icon:"📋", text:"Assigned" };
  }

  if(t.includes("departed")){
    return { cls:"departed", icon:"🚗", text:"Departed" };
  }

  // ✅ NEW
 if(t.includes("done")){
  return { cls:"done", icon:"🎯", text:s }; // ใช้ text จริง
}
  if(t.includes("accepted")){
    return { cls:"accepted", icon:"📥", text:"Accepted" };
  }

  if(t.includes("interupted") || t.includes("interrupted")){
    return { cls:"interrupted", icon:"⚠️", text:"Interrupted" };
  }

  if(t.includes("held")){
    return { cls:"held", icon:"💤", text:"Held" };
  }

  if(t.includes("cancel")){
    return { cls:"cancel", icon:"❌", text:"Cancel" };
  }

  if(t.includes("transfer")){
    return { cls:"transfer", icon:"🔁", text:"Transfer" };
  }

  return { cls:"created", icon:" 🆕 ", text:"Created" };
}

function toggleAllStatus(){
  viewMode = (viewMode + 1) % 3;
  render();
}


function getSLA(hr, limit){
  let pct = Math.min((hr/limit)*100, 100);

  let color = "sla-green";

  if(pct > 70) color = "sla-yellow";
  if(pct > 90) color = "sla-red";

  return {pct, color};
}

const PROV_CODE = {

function mapCol(r,k){for(let x of k){if(r[x]!=undefined)return r[x];}return"";}

function getWorkType(t){
  t = (t || "").toLowerCase();
// 📉 Signal Loss (ต้องอยู่บนสุด)
if(
  t.includes("high loss") ||
  t.includes("loss") ||
  (t.includes("pon") && t.includes("loss")) ||
  (t.includes("splitter") && t.includes("l2"))   // ✅ เพิ่มตรงนี้
){
  return {
    icon:"📉",
    text:"Signal Loss",
    full:"📉 Signal Loss (High loss)",
    type:"transmission"
  };
}
// 🏢 Business Circuit
if(
  t.includes("bipv") ||
  t.includes("inf") ||
  t.includes("ipv") ||
  t.includes("binl") ||
  t.includes("inl")
){
  return {
    icon:"🏢",
    text:"Business Circuit",
    full:"🏢 Business Circuit (BIPV / INF / IPV / INL)",
    type:"leased"
  };
}
  // 🔗 Access Down
  if(t.includes("splitter") || t.includes("pon")){
    return {
      icon:"🔗",
      text:"Access Down",
      full:"🔗 Access Down (Splitter / PON)",
      type:"access"
    };
  }

  // ⚡ Access Power Fail
  if(t.includes("olt") || t.includes("ac fail")){
    return {
      icon:"⚡",
      text:"Access Power Fail",
      full:"⚡ Access Power Fail (OLT AC Fail)",
      type:"access"
    };
  }

  // 📡 Transmission Error
  if(t.includes("crc")){
    return {
      icon:"📡",
      text:"Transmission Error",
      full:"📡 Transmission Error (CRC)",
      type:"transmission"
    };
  }

  // 🔌 Power Failure
  if(t.includes("rectifier") || t.includes("power")){
    return {
      icon:"🔌",
      text:"Power Failure",
      full:"🔌 Power Failure (Rectifier)",
      type:"power"
    };
  }
// 🔁❌ ERPS Loop Broken
if(t.includes("loop broken")){
  return {
    icon:"🔁❌",
    text:"Loop Broken",
    full:"🔁❌ ERPS Loop Broken",
    type:"access"
  };
}

  // 🚫 Link Down
  if(t.includes("link down") || t.includes("down")){
    return {
      icon:"🚫",
      text:"Link Down",
      full:"🚫 Link Down",
      type:"access"
    };
  }

  return {
    icon:"❗",
    text:"Unknown",
    full:"❗ Unknown",
    type:"other"
  };
}
function getSite(title){

let m =
  (title || "")
  .match(/(ME|OX|AN)_[0-9_]+/i);

return m ? m[0] : "Unknown";

}
const getHr=t=>{let d=new Date(t);return isNaN(d)?0:(new Date()-d)/3600000}
function formatTime(hr){
  let h = Math.floor(hr);
  let m = Math.round((hr - h) * 60);

  return h > 0
    ? (m > 0 ? `${h}h ${m}m` : `${h}h`)
    : `${m}m`;
}

function showAIBoard(){

let prov = $("#provinceFilter").val();

let jobs = [];

data.forEach(r=>{

  let p = mapCol(r,["Province Name"]);

  // เฉพาะจังหวัดที่เลือก
  if(prov && p!==prov) return;

  let pr =
    (r["Priority"] || "NONE").toUpperCase();

  let hr =
    getHr(r["Create Time"]);

  let limit =
    pr==="CRITICAL" ? 3 :
    pr==="MAJOR" ? 10 :
    1000;

  let overdue =
    Math.max(0,hr-limit);

  let score = 0;

  if(pr==="CRITICAL") score+=100;
  else if(pr==="MAJOR") score+=60;
  else if(pr==="MINOR") score+=30;

  score += overdue * 5;

  jobs.push({
  ...r,
  score,
  overdue,
  limit
});

});

jobs.sort((a,b)=>b.score-a.score);

/* DISTRICT PRIORITY */

let districtMap = {};

jobs.forEach(r=>{

  let district =
    r["District Name"] || "Unknown";

  if(!districtMap[district]){

    districtMap[district] = {
      jobs:[],
      critical:0,
      major:0,
      minor:0,
      overdue:0,
      score:0
    };

  }

  districtMap[district].jobs.push(r);

  let pr =
    (r["Priority"] || "")
    .toUpperCase();

  if(pr==="CRITICAL")
    districtMap[district].critical++;

  else if(pr==="MAJOR")
    districtMap[district].major++;

  else
    districtMap[district].minor++;

  if(r.overdue > 0)
    districtMap[district].overdue++;

});

/* SCORE ใช้จัดอันดับเท่านั้น */

let districtList =
Object.entries(districtMap)
.map(([name,d])=>{

  d.score =
      d.critical * 100
    + d.major * 50
    + d.overdue * 30
    + d.jobs.length * 5;

  return {
    district:name,
    ...d
  };

})
.sort((a,b)=>b.score-a.score);
/* ✅ สร้างรายการอำเภอ */
let districts = {};

jobs.forEach(r=>{

  let d = r["District Name"] || "";

  if(!d) return;

  districts[d] = (districts[d] || 0) + 1;

});

/* ROOT CAUSE GROUP */
let roots = {};

jobs.forEach(r=>{

  let work =
    getWorkType(r["Job Title"]).text;

  if(!roots[work]){
    roots[work] = [];
  }

  roots[work].push(r);

});
let rootHtml = "";


Object.entries(roots)
.sort((a,b)=>{

  let aCritical =
    a[1].filter(x =>
      (x["Priority"] || "")
      .toUpperCase() === "CRITICAL"
    ).length;

  let bCritical =
    b[1].filter(x =>
      (x["Priority"] || "")
      .toUpperCase() === "CRITICAL"
    ).length;

  if (bCritical !== aCritical)
    return bCritical - aCritical;

  return b[1].length - a[1].length;

})
.forEach(([root,list])=>{

  let critical =
    list.filter(x =>
      (x["Priority"] || "")
      .toUpperCase() === "CRITICAL"
    ).length;
  
  let danger =
    critical >= 3
      ? "critical"
      : "";

    rootHtml += `

  `;

  list.forEach(r=>{

          <br><br>

          <b>Remark</b><br>
          ${r["Reason by WF"] || "-"}

        </div>

      </details>

    `;

  });

  rootHtml += `
  </div>
  `;

});

/* SITE CLUSTER */
let sites = {};
let engineers = {};

jobs.forEach(r=>{

  let eng =
  (r["Assign to"] || "").trim();

if(!eng)
  return;

  if(!engineers[eng]){
    engineers[eng] = {
      jobs:[]
    };

        <div class="job-title">

        ${getWorkType(x["Job Title"]).icon}
        ${getWorkType(x["Job Title"]).text}

        <br>

        ${x["Job Title"] || "-"}

      </div>

      👷 ${x["Assign to"] || "-"}

        <br>

        🔥 OVERDUE
        </div>

      `).join("")
    }

  </details>

  

</div>

`;

});

let engineerHtml = "";

let shiftList = getShiftNames();

let shiftNames =
  shiftList.map(x =>
    x.toLowerCase().trim()
  );

  Object.entries(engineers)

.sort((a,b)=>{

  // ✅ NER Pool อยู่บนสุดเสมอ
  if(a[0] === "Workforce NER Pool") return -1;
  if(b[0] === "Workforce NER Pool") return 1;

  let aOn =
    shiftNames.includes(
      a[0].toLowerCase().trim()
    );

  let bOn =
    shiftNames.includes(
      b[0].toLowerCase().trim()
    );

  // ✅ ON DUTY ก่อน
  if(aOn && !bOn) return -1;
  if(!aOn && bOn) return 1;

  // ✅ งานเยอะสุดก่อน
  return (
    b[1].jobs.length -
    a[1].jobs.length
  );

})

.forEach(([eng,obj])=>{

  let isPool =
    eng === "Workforce NER Pool";

  let onDuty =
    shiftNames.includes(
      eng.toLowerCase().trim()
    );

  /* ===== ไม่มีงาน ===== */

  if(
  !isPool &&
  obj.jobs.length === 0
){
  return;
}

  let dutyText =
    isPool
      ? "📦 NER POOL"
      : onDuty
      ? "🟢 ON DUTY"
      : "⚫ OFF DUTY";

  let cardClass =
    isPool
      ? "pool"
      : onDuty
      ? "duty-on"
      : "duty-off";

  let critical =
    obj.jobs.filter(x=>
      (x["Priority"]||"")
      .toUpperCase()==="CRITICAL"
    ).length;

  let major =
    obj.jobs.filter(x=>
      (x["Priority"]||"")
      .toUpperCase()==="MAJOR"
    ).length;

  let overdue =
    obj.jobs.filter(x=>
      x.overdue>0
    ).length;

  let level =
    obj.jobs.length >= 8
      ? "🔴 HIGH"
      : obj.jobs.length >= 4
      ? "🟡 MEDIUM"
      : "🟢 LOW";

  engineerHtml += `
  <div class="ai-card ${cardClass}">

    <div class="job">
      👨‍🔧 ${eng}
    </div>

    <div class="detail">
      ${dutyText}
    </div>

    <details class="job-expand">

<summary>
  📋 Jobs : ${obj.jobs.length}
</summary>

${obj.jobs.map(job=>{

  let remain =
    job.overdue > 0
    ? "🔥 OVERDUE"
    : `⏱ ${formatTime(
        job.limit -
        getHr(job["Create Time"])
      )}`;

  return `
    <div style="
      margin-top:8px;
      padding:8px;
      background:#111827;
      border-radius:8px;
    ">

    <b>${job["Job ID"]}</b>

<br>

${getPriorityIcon(job["Priority"])}
|
${getStatusIcon(job["Status"])}

<br>

${getWorkType(job["Job Title"]).icon}
${getWorkType(job["Job Title"]).text}

<br>

${remain}

    </div>
  `;
}).join("")}

</details>

    <div class="detail">
      🚨 Critical : ${critical}
    </div>

    <div class="detail">
      ⚠️ Major : ${major}
    </div>

    <div class="detail">
      🕒 Overdue : ${overdue}
    </div>

    <div class="reason">
      Workload : ${level}
    </div>

  </div>
  `;

});

html += `

</div>

<div id="rootView"
     class="board"
     style="display:none">

  ${rootHtml}

</div>
<div id="engineerView"
     class="board"
     style="display:none">

  ${engineerHtml}

</div>
</div>


</body>
</html>
`;

let w = window.open();
w.document.write(html);
w.document.close();

w.changeView = function(view, btn){

w.document
  .querySelectorAll(".view-btn")
  .forEach(x=>x.classList.remove("active"));

btn.classList.add("active");

let engineerView =
  w.document.getElementById("engineerView");

if(engineerView)
  engineerView.style.display="none";
let districtView =
  w.document.getElementById("districtView");

let rootView =
  w.document.getElementById("rootView");

let siteView =
  w.document.getElementById("siteView");

if(districtView)
  districtView.style.display = "none";

if(rootView)
  rootView.style.display = "none";

if(siteView)
  siteView.style.display = "none";

switch(view){

  case "engineer":
  if(engineerView)
    engineerView.style.display="flex";
break;

  case "district":
  if(districtView)
    districtView.style.display = "flex";
  break;

case "root":
  if(rootView)
    rootView.style.display = "flex";
  break;

case "site":
  if(siteView)
    siteView.style.display = "flex";
  break;

}

};


w.filterDistrict = function(district, btn){

w.document
  .querySelectorAll(".district-btn")
  .forEach(x =>
    x.classList.remove("active")
  );

if(btn){
  btn.classList.add("active");
}

w.document
  .querySelectorAll("#districtView .ai-card")
  .forEach(card=>{

    let cardDistrict =
      (card.dataset.district || "")
      .trim()
      .toLowerCase();

    let targetDistrict =
      (district || "")
      .trim()
      .toLowerCase();

    card.style.display =
      !district ||
      cardDistrict === targetDistrict
        ? ""
        : "none";

  });

w.document
  .querySelectorAll(".arrow")
  .forEach(a=>{

    a.style.display =
      district ? "none" : "";

  });

};

}

function render(){

 let prov=$("#provinceFilter").val();

 let map={},c=0,m=0,n=0,o=0;


 data.forEach(r=>{

  let pr=(mapCol(r,["Priority"])||"NONE").toUpperCase();
  let p=mapCol(r,["Province Name"]);

  /* ✅ SEARCH */
 let job=(mapCol(r,["Job ID"])||"").toLowerCase();
let title=(mapCol(r,["Job Title"])||"").toLowerCase();
let status=(mapCol(r,["Status"])||"").toLowerCase();
let assign=(mapCol(r,["Assign to"])||"").toLowerCase();
let province=(mapCol(r,["Province Name"])||"").toLowerCase();
let district=(mapCol(r,["District Name"])||"").toLowerCase();
let work=getWorkType(title).text.toLowerCase();

// ✅ SLA คำนวณก่อน
let hr = getHr(r["Create Time"]);
let limit =
  pr === "CRITICAL" ? 3 :
  pr === "MAJOR" ? 10 :
  1000;

let od = hr > limit;

// ✅ SEARCH (ใช้ overdue ได้)
let k = $('#search').val().toLowerCase().trim();

let keys = k.split(/\s+/);

let code = (PROV_CODE[p] || "").toLowerCase();

let text = job+" "+title+" "+status+" "+assign+" "+province+" "+district+" "+work+" "+code;
if(od) text += " overdue";

for(let key of keys){
  if(key === "overdue" && !od) return;
  if(key !== "overdue" && !text.includes(key)) return;
}



// ✅ filter จังหวัด
if(prov && p!==prov)return;



  if(pr==="CRITICAL")c++;
  else if(pr==="MAJOR")m++;
  else n++;
  if(od)o++;
  if(!pass(pr,od))return;

  if(!map[p])map[p]=[];

  map[p].push({...r,pr,hr,limit,od,
    district:r["District Name"],
    status:r["Status"],
    assign:r["Assign to"]||"-",
    work:getWorkType(title)
  });
 });

$("#c").text("Critical:"+c);
$("#m").text("Major:"+m);
$("#n").text("Minor:"+n);
$("#t").text("Total:"+(c+m+n));
$("#o").text("Overdue:"+o);

root.innerHTML=Object.keys(map).map(p=>`

<table>

  Mode
  <span onclick="toggleAllStatus()" style="cursor:pointer;margin-left:6px">

  </span>
</th>


</th>

<th>Title</th><th>Province</th><th>Assign</th><th>Elapsed</th><th>Remain</th></tr>

${map[p].map(r=>`
<tr class="${r.od?'overdue':''}">
<td>${r["Job ID"]||""}</td>

  <div class="badge ${r.pr.toLowerCase()}">${r.pr}</div>
</td>

<td>

<div class="work work-${r.work.type}"

</div>

<div class="status-badge status-${getStatusInfo(r.status).cls}"
     style="display:${(viewMode===1 || viewMode===2) ? 'inline-flex' : 'none'}">

  ${getStatusInfo(r.status).icon}
  ${getStatusInfo(r.status).text}

</div>



</td>

<td>
  ${(()=>{
